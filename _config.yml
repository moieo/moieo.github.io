########################### Plugins ###########################
# npm i hexo-generator-feed
feed:
  type: atom
  path: atom.xml
  limit: false
  content: true
  icon: https://cdn.jsdelivr.net/gh/cdn-x/xaoxuu/avatar/rect-256@2x.png
  autodiscovery: true

# npm install hexo-footnote --save
footnote:
  location_target_class: location-target

# 站点地图
sitemap:
  path: sitemap.xml
  tag: true
  category: true
baidusitemap:
  path: baidusitemap.xml

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  - type: git
    repo: git@github.com:moieo/moieo.github.io.git
    branch: main
