# 文章搜索
search:
  service: local_search # local_search, todo...
  local_search: # 在 front-matter 中设置 indexing:false 来避免被搜索索引
    field: all # post, page, all
    path: /search.json # 搜索文件存放位置
    content: true # 是否搜索内容
    codeblock: true # 是否搜索代码块（需要content: true)

######## Sidebar ########
sidebar:
  logo:
    avatar: "[config.avatar](/)" # you can set avatar link in _config.yml or '[https://xxx.png](/about/)'
    title: "[config.title](/)"
  menu:
    home: "[btn.home](/)"
    post: "[btn.blog](/blog/)"
    wiki: "[btn.wiki](/wiki/)"
    notes: "[btn.notes](/notes/)"
    friends: "[btn.friends](/friends/)"
  widgets:
    #### 自动生成的页面 ####
    # 主页
    home: [search, welcome, recent, timeline] # for home
    # 博客索引页
    blog_index: [search_blog, recent, timeline] # for categories/tags/archives
    # 文档索引页
    wiki_index: [search_docs, recent, timeline] # for wiki
    # 其它（404）
    others: [search, welcome, recent, timeline] # for 404 and ...
    #### 手动创建的页面 ####
    # 文章内页
    post: [toc, ghrepo, search, ghissues] # for pages using 'layout:post'
    # 文档内页
    wiki: [search, ghrepo, toc, ghissues, related] # for pages using 'layout:wiki'
    # 其它 layout:page 的页面
    page: [welcome, toc, search] # for custom pages using 'layout:page'

######## Article ########
article:
  # 文章许可协议
  license:
    "本文采用 [署名-非商业性使用-相同方式共享 4.0 国际](https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh) 许可协议，转载请注明出处。"
  # 如果没有指定封面，是否根据 tags 作为关键词搜索封面图片？
  auto_cover: false # search from https://source.unsplash.com/
  # 如果没有指定横幅，是否根据 tags 作为关键词搜索横幅图片？
  auto_banner: false # search from https://source.unsplash.com/
  # 如果没有指定 excerpt 和 description，将自动取多长的内容作为文章摘要？
  auto_excerpt: 200
  # 分类颜色
  category_color:
    '探索号': '#f44336'
  # 分享
  share: # [wechat, weibo, email, link]
  # 相关文章，需要安装插件 (for layout: post)
  # npm i hexo-related-popular-posts
  related_posts:
    enable: true
    max_count: 5

######## Comments ########
comments:
  service: twikoo # beaudar, utterances, twikoo, waline
  # Twikoo
  # https://twikoo.js.org/
  twikoo:
    js: https://unpkg.com/twikoo@1.6.7 # 建议锁定版本
    envId: https://twikoo.moieo.top # vercel函数

